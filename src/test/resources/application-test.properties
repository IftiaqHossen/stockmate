# ── StockMate Test Profile ─────────────────────────────────────────────────
# Place this file at: src/test/resources/application-test.properties
# Activated via @ActiveProfiles("test") in all integration test classes.
# ──────────────────────────────────────────────────────────────────────────

# H2 in-memory database — replaces PostgreSQL for test runs
spring.datasource.url=jdbc:h2:mem:stockmate_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Create schema from JPA entities; drop on test completion
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Thymeleaf — disable cache, enable lenient mode for test templates
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=false

# Suppress Spring Boot banner in test output
spring.main.banner-mode=off

# Reduce log noise during test runs
logging.level.root=WARN
logging.level.com.stockmate=INFO
logging.level.org.springframework.security=WARN

# Disable Flyway / Liquibase if present — H2 uses ddl-auto instead
spring.flyway.enabled=false
spring.liquibase.enabled=false
