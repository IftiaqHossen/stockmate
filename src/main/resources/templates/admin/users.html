<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Users | StockMate</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <script defer th:src="@{/js/main.js}"></script>
  </head>
  <body>
    <div class="site-shell">
      <div
        th:replace="~{fragments/header :: siteHeader('User Management')}"
      ></div>

      <main class="page">
        <div th:replace="~{fragments/header :: flashMessages}"></div>

        <div class="container">
          <section class="card">
            <div class="page-head">
              <div>
                <h2 class="page-title">Users</h2>
                <p class="page-subtitle">
                  Assign roles, disable access, or remove accounts.
                </p>
              </div>
            </div>

            <div
              class="table-wrap"
              th:if="${users != null and !#lists.isEmpty(users)}"
            >
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Roles</th>
                    <th>Enabled</th>
                    <th>Created</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.username}">username</td>
                    <td th:text="${user.email}">email@example.com</td>
                    <td>
                      <span
                        class="badge"
                        th:each="role : ${user.roles}"
                        th:text="${role}"
                        >ROLE_BUYER</span
                      >
                    </td>
                    <td>
                      <span
                        class="badge"
                        th:text="${user.enabled ? 'Enabled' : 'Disabled'}"
                        >Enabled</span
                      >
                    </td>
                    <td
                      th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"
                    >
                      2026-01-01 00:00
                    </td>
                    <td>
                      <div class="form-grid" style="min-width: 250px">
                        <form
                          th:action="@{/admin/users/{id}/role(id=${user.id})}"
                          th:object="${roleChangeRequest}"
                          method="post"
                          class="form-grid"
                        >
                          <input type="hidden" name="_method" value="put" />
                          <input
                            type="hidden"
                            th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}"
                          />

                          <select name="newRole">
                            <option
                              value="ROLE_BUYER"
                              th:selected="${user.roles.contains('ROLE_BUYER')}"
                            >
                              ROLE_BUYER
                            </option>
                            <option
                              value="ROLE_SELLER"
                              th:selected="${user.roles.contains('ROLE_SELLER')}"
                            >
                              ROLE_SELLER
                            </option>
                            <option
                              value="ROLE_ADMIN"
                              th:selected="${user.roles.contains('ROLE_ADMIN')}"
                            >
                              ROLE_ADMIN
                            </option>
                          </select>
                          <button class="btn btn-secondary" type="submit">
                            Change Role
                          </button>
                        </form>

                        <form
                          th:if="${user.enabled}"
                          th:action="@{/admin/users/{id}/disable(id=${user.id})}"
                          method="post"
                          data-confirm="Disable this user account?"
                        >
                          <input type="hidden" name="_method" value="put" />
                          <input
                            type="hidden"
                            th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}"
                          />
                          <button class="btn btn-ghost" type="submit">
                            Disable
                          </button>
                        </form>

                        <form
                          th:action="@{/admin/users/{id}(id=${user.id})}"
                          method="post"
                          data-confirm="Permanently delete this user account?"
                        >
                          <input type="hidden" name="_method" value="delete" />
                          <input
                            type="hidden"
                            th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}"
                          />
                          <button class="btn btn-danger" type="submit">
                            Delete
                          </button>
                        </form>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <p
              class="empty-state"
              th:if="${users == null or #lists.isEmpty(users)}"
            >
              No users found.
            </p>
          </section>
        </div>
      </main>

      <div th:replace="~{fragments/footer :: siteFooter}"></div>
    </div>
  </body>
</html>
