# ============================================================
# StockMate ? Base Application Properties
# No credentials here. Profile-specific files override these.
# ============================================================

spring.application.name=stockmate

# ?? Active Profile ??????????????????????????????????????????
# Override via environment variable: SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=dev

# ?? Thymeleaf ???????????????????????????????????????????????
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ?? JPA / Hibernate ?????????????????????????????????????????
# snake_case column naming (matches PRD DB schema)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

# Do NOT auto-create or drop schema ? managed manually via SQL
spring.jpa.hibernate.ddl-auto=validate

# Show SQL in logs (dev-friendly, overridden in prod)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL dialect (Hibernate 6 auto-detects, but explicit is safer)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ?? Server ??????????????????????????????????????????????????
server.port=8080

# ?? Logging ?????????????????????????????????????????????????
logging.level.com.stockmate=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

#Now add the one required application.properties line for DashboardController
spring.mvc.hiddenmethod.filter.enabled=true