# ============================================================
# StockMate ? PROD Profile (Render deployment)
# All values come from environment variables ? never hardcoded.
# ============================================================

# ?? Database (injected by Render / Docker) ???????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA (prod overrides ? no SQL logging) ????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ?? Thymeleaf (cache enabled in prod) ????????????????????????
spring.thymeleaf.cache=true

# ?? Logging (minimal in prod) ????????????????????????????????
logging.level.com.stockmate=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN