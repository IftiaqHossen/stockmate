<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Register | StockMate</title>
	<link rel="stylesheet" th:href="@{/css/main.css}" />
	<script defer th:src="@{/js/main.js}"></script>
</head>
<body>
<div class="site-shell">
	<div th:replace="~{fragments/header :: siteHeader('Register')}"></div>

	<main class="page">
		<div th:replace="~{fragments/header :: flashMessages}"></div>

		<section class="card auth-card">
			<div class="page-head">
				<div>
					<h2 class="page-title">Create Account</h2>
					<p class="page-subtitle">Register as a buyer or seller.</p>
				</div>
			</div>

			<form th:action="@{/auth/register}" th:object="${registerRequest}" method="post" class="form-grid">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

				<div class="field">
					<label for="username">Username</label>
					<input id="username" type="text" th:field="*{username}" autocomplete="username" required />
					<p class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Username error</p>
				</div>

				<div class="field">
					<label for="email">Email</label>
					<input id="email" type="email" th:field="*{email}" autocomplete="email" required />
					<p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</p>
				</div>

				<div class="field">
					<label for="password">Password</label>
					<input id="password" type="password" th:field="*{password}" autocomplete="new-password" required />
					<p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password error</p>
				</div>

				<div class="field">
					<label for="role">Account Type</label>
					<select id="role" th:field="*{role}" required>
						<option value="ROLE_BUYER">Buyer</option>
						<option value="ROLE_SELLER">Seller</option>
					</select>
					<p class="field-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}">Role error</p>
				</div>

				<div class="btn-row">
					<button class="btn" type="submit">Register</button>
					<a th:href="@{/auth/login}">Already have an account?</a>
				</div>
			</form>
		</section>
	</main>

	<div th:replace="~{fragments/footer :: siteFooter}"></div>
</div>
</body>
</html>
