<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories | StockMate</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <script defer th:src="@{/js/main.js}"></script>
  </head>
  <body>
    <div class="site-shell">
      <div
        th:replace="~{fragments/header :: siteHeader('Category Management')}"
      ></div>

      <main class="page">
        <div th:replace="~{fragments/header :: flashMessages}"></div>

        <div class="container grid">
          <section class="card" sec:authorize="hasRole('ADMIN')">
            <div class="page-head">
              <div>
                <h2 class="page-title">Create Category</h2>
                <p class="page-subtitle">
                  Use this form for quick category creation.
                </p>
              </div>
              <a class="btn btn-ghost" th:href="@{/categories/new}"
                >Open Full Form</a
              >
            </div>

            <form
              th:action="@{/categories}"
              th:object="${categoryRequest}"
              method="post"
              class="form-grid form-grid-2"
            >
              <input
                type="hidden"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}"
              />

              <div class="field">
                <label for="name">Name</label>
                <input id="name" type="text" th:field="*{name}" required />
                <p
                  class="field-error"
                  th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"
                >
                  Name error
                </p>
              </div>

              <div class="field">
                <label for="description">Description</label>
                <input id="description" type="text" th:field="*{description}" />
                <p
                  class="field-error"
                  th:if="${#fields.hasErrors('description')}"
                  th:errors="*{description}"
                >
                  Description error
                </p>
              </div>

              <div class="btn-row">
                <button class="btn" type="submit">Create Category</button>
              </div>
            </form>
          </section>

          <section class="card">
            <div class="page-head">
              <div>
                <h2 class="page-title">All Categories</h2>
                <p class="page-subtitle">
                  Used by product creation and catalogue filtering.
                </p>
              </div>
            </div>

            <div
              class="table-wrap"
              th:if="${categories != null and !#lists.isEmpty(categories)}"
            >
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th sec:authorize="hasRole('ADMIN')">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="category : ${categories}">
                    <td th:text="${category.id}">1</td>
                    <td th:text="${category.name}">Category</td>
                    <td th:text="${category.description}">Description</td>
                    <td sec:authorize="hasRole('ADMIN')">
                      <div class="btn-row">
                        <a
                          class="btn btn-secondary"
                          th:href="@{/categories/{id}/edit(id=${category.id})}"
                          >Edit</a
                        >

                        <form
                          th:action="@{/categories/{id}(id=${category.id})}"
                          method="post"
                          data-confirm="Delete this category?"
                        >
                          <input type="hidden" name="_method" value="delete" />
                          <input
                            type="hidden"
                            th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}"
                          />
                          <button class="btn btn-danger" type="submit">
                            Delete
                          </button>
                        </form>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <p
              class="empty-state"
              th:if="${categories == null or #lists.isEmpty(categories)}"
            >
              No categories available.
            </p>
          </section>
        </div>
      </main>

      <div th:replace="~{fragments/footer :: siteFooter}"></div>
    </div>
  </body>
</html>
