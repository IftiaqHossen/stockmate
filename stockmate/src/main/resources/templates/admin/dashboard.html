<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Admin Dashboard | StockMate</title>
	<link rel="stylesheet" th:href="@{/css/main.css}" />
	<script defer th:src="@{/js/main.js}"></script>
</head>
<body>
<div class="site-shell">
	<div th:replace="~{fragments/header :: siteHeader('Admin Dashboard')}"></div>

	<main class="page">
		<div th:replace="~{fragments/header :: flashMessages}"></div>

		<div class="container grid">
			<section class="card grid grid-2">
				<div class="kpi">
					<span class="kpi-label">Total Users</span>
					<span class="kpi-value" th:text="${totalUsers}">0</span>
				</div>
				<div class="kpi">
					<span class="kpi-label">Total Orders</span>
					<span class="kpi-value" th:text="${totalOrders}">0</span>
				</div>
			</section>

			<section class="card">
				<div class="btn-row">
					<a class="btn" th:href="@{/admin/users}">Manage Users</a>
					<a class="btn btn-secondary" th:href="@{/categories}">Manage Categories</a>
					<a class="btn btn-ghost" th:href="@{/orders}">All Orders</a>
				</div>
			</section>

			<section class="card">
				<div class="page-head">
					<div>
						<h2 class="page-title">Recent Orders</h2>
						<p class="page-subtitle">Latest 10 orders in the system.</p>
					</div>
				</div>

				<div class="table-wrap" th:if="${recentOrders != null and !#lists.isEmpty(recentOrders)}">
					<table>
						<thead>
						<tr>
							<th>ID</th>
							<th>Product</th>
							<th>Buyer</th>
							<th>Seller</th>
							<th>Total</th>
							<th>Status</th>
							<th>Ordered At</th>
						</tr>
						</thead>
						<tbody>
						<tr th:each="order : ${recentOrders}">
							<td th:text="${order.id}">1</td>
							<td th:text="${order.productName}">Product</td>
							<td th:text="${order.buyerUsername}">Buyer</td>
							<td th:text="${order.sellerUsername}">Seller</td>
							<td th:text="${order.totalPrice}">0.00</td>
							<td><span class="badge" th:text="${order.status}">PENDING</span></td>
							<td th:text="${#temporals.format(order.orderedAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 00:00</td>
						</tr>
						</tbody>
					</table>
				</div>

				<p class="empty-state" th:if="${recentOrders == null or #lists.isEmpty(recentOrders)}">
					No orders available yet.
				</p>
			</section>
		</div>
	</main>

	<div th:replace="~{fragments/footer :: siteFooter}"></div>
</div>
</body>
</html>
