<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Category Form | StockMate</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <script defer th:src="@{/js/main.js}"></script>
</head>
<body>
<div class="site-shell">
    <div th:replace="~{fragments/header :: siteHeader('Category Form')}"></div>

    <main class="page">
        <div th:replace="~{fragments/header :: flashMessages}"></div>

        <div class="container">
            <section class="card auth-card" style="max-width: 760px;">
                <div class="page-head">
                    <div>
                        <h2 class="page-title" th:text="${formAction == 'edit'} ? 'Edit Category' : 'Create Category'">Create Category</h2>
                        <p class="page-subtitle">Category forms are bound to CreateCategoryRequest.</p>
                    </div>
                </div>

                <form method="post"
                      th:object="${categoryRequest}"
                      th:action="${formAction == 'edit'} ? @{/categories/{id}(id=${category.id})} : @{/categories}"
                      class="form-grid">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input th:if="${formAction == 'edit'}" type="hidden" name="_method" value="put" />

                    <div class="field">
                        <label for="name">Category Name</label>
                        <input id="name" type="text" th:field="*{name}" required />
                        <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</p>
                    </div>

                    <div class="field">
                        <label for="description">Description</label>
                        <textarea id="description" th:field="*{description}"></textarea>
                        <p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description error</p>
                    </div>

                    <div class="btn-row">
                        <button class="btn" type="submit" th:text="${formAction == 'edit'} ? 'Update Category' : 'Create Category'">Create Category</button>
                        <a class="btn btn-ghost" th:href="@{/categories}">Back to Categories</a>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: siteFooter}"></div>
</div>
</body>
</html>
