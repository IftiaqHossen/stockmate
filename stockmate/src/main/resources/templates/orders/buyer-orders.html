<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>My Orders | StockMate</title>
	<link rel="stylesheet" th:href="@{/css/main.css}" />
	<script defer th:src="@{/js/main.js}"></script>
</head>
<body>
<div class="site-shell">
	<div th:replace="~{fragments/header :: siteHeader('My Orders')}"></div>

	<main class="page">
		<div th:replace="~{fragments/header :: flashMessages}"></div>

		<div class="container">
			<section class="card">
				<div class="page-head">
					<div>
						<h2 class="page-title">My Orders</h2>
						<p class="page-subtitle">Track and manage your purchase history.</p>
					</div>
				</div>

				<div class="table-wrap" th:if="${orders != null and !#lists.isEmpty(orders)}">
					<table>
						<thead>
						<tr>
							<th>ID</th>
							<th>Product</th>
							<th>Quantity</th>
							<th>Total</th>
							<th>Status</th>
							<th>Ordered At</th>
							<th>Action</th>
						</tr>
						</thead>
						<tbody>
						<tr th:each="order : ${orders}">
							<td th:text="${order.id}">1</td>
							<td>
								<a th:href="@{/products/{id}(id=${order.productId})}" th:text="${order.productName}">Product</a>
							</td>
							<td th:text="${order.quantity}">1</td>
							<td th:text="${order.totalPrice}">0.00</td>
							<td><span class="badge" th:text="${order.status}">PENDING</span></td>
							<td th:text="${#temporals.format(order.orderedAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 00:00</td>
							<td>
								<form th:if="${order.status != 'DELIVERED' and order.status != 'CANCELLED'}"
									  th:action="@{/orders/{id}/cancel(id=${order.id})}"
									  method="post"
									  data-confirm="Cancel this order? Stock will be restored.">
									<input type="hidden" name="_method" value="put" />
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
									<button class="btn btn-danger" type="submit">Cancel</button>
								</form>
								<span th:if="${order.status == 'DELIVERED' or order.status == 'CANCELLED'}">N/A</span>
							</td>
						</tr>
						</tbody>
					</table>
				</div>

				<p class="empty-state" th:if="${orders == null or #lists.isEmpty(orders)}">
					You do not have any orders yet. Visit the catalogue to place your first order.
				</p>
			</section>
		</div>
	</main>

	<div th:replace="~{fragments/footer :: siteFooter}"></div>
</div>
</body>
</html>
