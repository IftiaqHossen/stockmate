<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Product Form | StockMate</title>
	<link rel="stylesheet" th:href="@{/css/main.css}" />
	<script defer th:src="@{/js/main.js}"></script>
</head>
<body>
<div class="site-shell">
	<div th:replace="~{fragments/header :: siteHeader('Product Form')}"></div>

	<main class="page">
		<div th:replace="~{fragments/header :: flashMessages}"></div>

		<div class="container">
			<section class="card">
				<div class="page-head">
					<div>
						<h2 class="page-title" th:text="${formAction == 'edit'} ? 'Edit Product' : 'Create Product'">Create Product</h2>
						<p class="page-subtitle">All fields are validated in the backend DTO layer.</p>
					</div>
				</div>

				<form method="post"
					  th:object="${productRequest}"
					  th:action="${formAction == 'edit'} ? @{/products/{id}(id=${product.id})} : @{/products}"
					  class="form-grid">

					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<input th:if="${formAction == 'edit'}" type="hidden" name="_method" value="put" />

					<div class="form-grid form-grid-2">
						<div class="field">
							<label for="name">Product Name</label>
							<input id="name" type="text" th:field="*{name}" required />
							<p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</p>
						</div>

						<div class="field">
							<label for="price">Price</label>
							<input id="price" type="number" step="0.01" min="0.01" th:field="*{price}" required />
							<p class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Price error</p>
						</div>
					</div>

					<div class="form-grid form-grid-2">
						<div class="field">
							<label for="stockQuantity">Stock Quantity</label>
							<input id="stockQuantity" type="number" min="0" th:field="*{stockQuantity}" required />
							<p class="field-error" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}">Stock error</p>
						</div>

						<div class="field">
							<label for="categoryId">Category</label>
							<select id="categoryId" th:field="*{categoryId}" required>
								<option value="">Select Category</option>
								<option th:each="category : ${categories}"
										th:value="${category.id}"
										th:text="${category.name}">
									Category
								</option>
							</select>
							<p class="field-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}">Category error</p>
						</div>
					</div>

					<div class="field">
						<label for="description">Description</label>
						<textarea id="description" th:field="*{description}"></textarea>
						<p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description error</p>
					</div>

					<div class="field" th:if="${formAction == 'edit'}">
						<label for="status">Product Status</label>
						<select id="status" th:field="*{status}">
							<option value="ACTIVE">ACTIVE</option>
							<option value="DISCONTINUED">DISCONTINUED</option>
						</select>
						<p class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Status error</p>
					</div>

					<div class="btn-row">
						<button class="btn" type="submit" th:text="${formAction == 'edit'} ? 'Update Product' : 'Create Product'">Create Product</button>
						<a class="btn btn-ghost" th:href="@{/products}">Cancel</a>
					</div>
				</form>
			</section>
		</div>
	</main>

	<div th:replace="~{fragments/footer :: siteFooter}"></div>
</div>
</body>
</html>
