<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Detail | StockMate</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <script defer th:src="@{/js/main.js}"></script>
  </head>
  <body>
    <div class="site-shell">
      <div
        th:replace="~{fragments/header :: siteHeader('Product Detail')}"
      ></div>

      <main class="page">
        <div th:replace="~{fragments/header :: flashMessages}"></div>

        <div class="container grid grid-2">
          <section class="card">
            <div class="page-head">
              <div>
                <h2 class="page-title" th:text="${product.name}">
                  Product Name
                </h2>
                <p class="page-subtitle" th:text="${product.categoryName}">
                  Category
                </p>
              </div>
              <span class="badge" th:text="${product.stockStatus}"
                >Stock Status</span
              >
            </div>

            <p th:text="${product.description}">Product description.</p>

            <div class="grid grid-2">
              <div class="kpi">
                <span class="kpi-label">Price</span>
                <span class="kpi-value" th:text="${product.price}">0.00</span>
              </div>
              <div class="kpi">
                <span class="kpi-label">Available Quantity</span>
                <span class="kpi-value" th:text="${product.stockQuantity}"
                  >0</span
                >
              </div>
            </div>

            <div class="product-meta" style="margin-top: 14px">
              <span th:text="'Seller: ' + ${product.sellerUsername}"
                >Seller</span
              >
              <span th:text="'Status: ' + ${product.status}">Status</span>
              <span
                th:text="'Created at: ' + ${#temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm')}"
                >Created</span
              >
            </div>

            <div class="btn-row" style="margin-top: 14px">
              <a class="btn btn-ghost" th:href="@{/products}"
                >Back to Catalogue</a
              >
              <a
                class="btn btn-secondary"
                sec:authorize="hasAnyRole('SELLER','ADMIN')"
                th:href="@{/products/{id}/edit(id=${product.id})}"
                >Edit</a
              >

              <form
                sec:authorize="hasAnyRole('SELLER','ADMIN')"
                th:action="@{/products/{id}(id=${product.id})}"
                method="post"
                data-confirm="Delete this product? This action cannot be undone."
              >
                <input type="hidden" name="_method" value="delete" />
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <button class="btn btn-danger" type="submit">Delete</button>
              </form>
            </div>
          </section>

          <section class="card" sec:authorize="hasRole('BUYER')">
            <h3 class="page-title" style="font-size: 1.2rem">Place Order</h3>
            <p class="page-subtitle">Submit quantity to create a new order.</p>

            <form
              th:action="@{/orders}"
              th:object="${placeOrderRequest}"
              method="post"
              class="form-grid"
            >
              <input
                type="hidden"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}"
              />
              <input type="hidden" th:field="*{productId}" />

              <div class="field">
                <label for="quantity">Quantity</label>
                <input
                  id="quantity"
                  type="number"
                  min="1"
                  th:field="*{quantity}"
                  required
                />
                <p
                  class="field-error"
                  th:if="${#fields.hasErrors('quantity')}"
                  th:errors="*{quantity}"
                >
                  Quantity error
                </p>
              </div>

              <div class="btn-row">
                <button class="btn" type="submit">Place Order</button>
              </div>
            </form>
          </section>
        </div>
      </main>

      <div th:replace="~{fragments/footer :: siteFooter}"></div>
    </div>
  </body>
</html>
