<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>400 | StockMate</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>
<div class="site-shell">
    <div th:replace="~{fragments/header :: siteHeader('Bad Request')}"></div>

    <main class="page">
        <div class="container">
            <section class="card auth-card">
                <h2 class="page-title" th:text="${errorTitle != null ? errorTitle : 'Bad Request'}">Bad Request</h2>
                <p class="page-subtitle" th:text="${errorMessage != null ? errorMessage : 'The request could not be processed.'}">The request could not be processed.</p>

                <div class="card" th:if="${errors != null and !#maps.isEmpty(errors)}">
                    <h3 class="page-title" style="font-size: 1.1rem;">Validation Errors</h3>
                    <ul>
                        <li th:each="entry : ${errors.entrySet()}" th:text="${entry.key + ': ' + entry.value}">field: message</li>
                    </ul>
                </div>

                <div class="btn-row" style="margin-top: 16px;">
                    <a class="btn" th:href="@{/products}">Go to Catalogue</a>
                </div>
            </section>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: siteFooter}"></div>
</div>
</body>
</html>
