# ============================================================
# StockMate ? DEV Profile (local development only)
# This file is safe to commit ? credentials use local defaults.
# Real secrets go in .env (gitignored).
# ============================================================

# ?? Database (local pgAdmin 4) ???????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/stockmate_db
spring.datasource.username=postgres
spring.datasource.password=1233
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP defaults are fine for dev)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

# ?? JPA (dev overrides) ??????????????????????????????????????
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? Logging (verbose for dev) ????????????????????????????????
logging.level.com.stockmate=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE