# ============================================================
# StockMate — Docker Compose
# Start the full stack : docker compose up --build
# Tear down with volumes : docker compose down -v
# ============================================================

services:

  # ── PostgreSQL 15 ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: stockmate_db
    environment:
      POSTGRES_DB:       stockmate_db
      POSTGRES_USER:     ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: run schema on first boot (comment out after first run)
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d stockmate_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Spring Boot Application ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockmate_app
    depends_on:
      db:
        condition: service_healthy      # Wait for DB to pass health check
    environment:
      SPRING_PROFILES_ACTIVE:    prod
      SPRING_DATASOURCE_URL:     jdbc:postgresql://db:5432/stockmate_db
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data: