name: Deploy to PROD

on:
  push:
    branches:
      - PROD

jobs:
  deploy-prod:
    name: Trigger Render PROD Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run tests (gate before deploy)
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
        run: chmod +x mvnw; ./mvnw --batch-mode --no-transfer-progress test

      - name: Trigger Render PROD deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_PROD }}
        run: |
          RENDER_DEPLOY_HOOK="$(echo "$RENDER_DEPLOY_HOOK" | tr -d '\r\n')"
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_PROD is empty or not set."
            exit 1
          fi
          case "$RENDER_DEPLOY_HOOK" in
            http://*|https://*) ;;
            *)
              echo "RENDER_DEPLOY_HOOK_PROD is not a valid URL."
              exit 1
              ;;
          esac
          curl --silent --show-error --fail "$RENDER_DEPLOY_HOOK"