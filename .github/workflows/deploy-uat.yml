name: Deploy to UAT

on:
  push:
    branches:
      - UAT

jobs:
  deploy-uat:
    name: Trigger Render UAT Deploy
    runs-on: ubuntu-latest
    needs: []

    # Only deploy after build-and-test passes on the same commit.
    # We re-run the test job here as a required gate before deploying.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run tests (gate before deploy)
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
        run: ./mvnw --batch-mode --no-transfer-progress test

      - name: Trigger Render UAT deploy hook
        run: |
          curl --silent --show-error --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK_UAT }}"